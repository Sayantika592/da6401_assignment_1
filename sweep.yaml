method: bayes
metric:
  name: test_f1
  goal: maximize

parameters:

  learning_rate:
    values: [0.0005, 0.001, 0.005, 0.01]

  batch_size:
    values: [32, 64, 128]

  optimizer:
    values: ["sgd", "momentum", "rmsprop", "adam", "nadam"]

  activation:
    values: ["relu", "tanh", "sigmoid"]

  weight_init:
    values: ["random", "xavier"]

  num_layers:
    values: [2, 3]

  hidden_sizes:
    values:
      - "128 64"
      - "256 128"
      - "128 64 32"

  loss:
    values: ["cross_entropy"]   # keep CE for classification

early_terminate:
  type: hyperband
  min_iter: 2

command:
  - ${env}
  - python3
  - src/train.py
  - -w_p
  - da6401
  - -m
  - src
  - -d
  - mnist
  - -e
  - 5
  - -b
  - ${batch_size}
  - -l
  - ${loss}
  - -o
  - ${optimizer}
  - -lr
  - ${learning_rate}
  - -nhl
  - ${num_layers}
  - -sz
  - ${hidden_sizes}
  - -a
  - ${activation}
  - -w_i
  - ${weight_init}