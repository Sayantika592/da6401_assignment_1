program: src/train.py

method: bayes

metric:
  name: test_f1
  goal: maximize

parameters:

  # REQUIRED FIXED ARGS
  wandb_project:
    value: da6401

  model_path:
    value: src

  dataset:
    value: mnist

  epochs:
    value: 5

  weight_decay:
    value: 0.0

  # SWEEP ARGS
  learning_rate:
    values: [0.0005, 0.001, 0.005]

  batch_size:
    values: [32, 64, 128]

  optimizer:
    values: ["sgd", "momentum", "rmsprop", "adam", "nadam"]

  activation:
    values: ["relu", "tanh", "sigmoid"]

  weight_init:
    values: ["random", "xavier"]

  loss:
    value: "cross_entropy"

  num_layers:
    value: 2

  hidden_sizes:
    values:
      - "64 64"
      - "128 64"
      - "256 128"

early_terminate:
  type: hyperband
  min_iter: 2